{% extends 'base.html' %}
{% block content %}
<header class="topbar">
  <div>
    <div class="brand">CROCODILLE <span>RENT</span></div>
    <h1>Administrace</h1>
    <p>Editace karet vozidel</p>
  </div>
  <div class="top-actions">
    <a class="btn small muted-btn" href="/">Web</a>
    <a class="btn small muted-btn" href="/admin/logout">Odhlásit</a>
  </div>
</header>

<div class="admin-vehicle-list">
  {% for v in vehicles %}
    <div class="admin-vehicle-card">
      <div class="admin-vehicle-data">
        <button class="copy-line" type="button" data-copy="{{ v.vehicle_id or '' }}">
          <small>ID</small>
          <strong>{{ v.vehicle_id or 'nezadáno' }}</strong>
        </button>

        <button class="copy-line" type="button" data-copy="{{ v.spz or '' }}">
          <small>SPZ</small>
          <strong>{{ v.spz or 'nezadáno' }}</strong>
        </button>

        <button class="copy-line" type="button" data-copy="{{ v.vin or '' }}">
          <small>VIN</small>
          <strong>{{ v.vin or 'nezadáno' }}</strong>
        </button>

        <div class="vehicle-admin-name">
          {{ v.brand or v.name or v.model or 'Vozidlo' }}
        </div>
      </div>

      <a class="btn small" href="/admin/{{ v.id }}">Upravit</a>
    </div>
  {% endfor %}
</div>

<div id="copy-toast" class="copy-toast">Zkopírováno</div>

<script>
document.querySelectorAll('[data-copy]').forEach((button) => {
  button.addEventListener('click', async () => {
    const value = button.dataset.copy;
    if (!value) return;

    try {
      await navigator.clipboard.writeText(value);
      const toast = document.getElementById('copy-toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1100);
    } catch (error) {
      console.error(error);
      alert('Kopírování se nepodařilo.');
    }
  });
});
</script>
{% endblock %}
