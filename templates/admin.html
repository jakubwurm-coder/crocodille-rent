{% extends 'base.html' %}
{% block content %}

    <h1>Administrace</h1>
    <p>Editace karet vozidel</p>
  </div>
  <div class="top-actions">
    <a class="btn small muted-btn" href="/">Web</a>
    <a class="btn small muted-btn" href="/admin/logout">Odhlásit</a>

</header>

<div class="table">

      <em>upravit</em>
    </a>
  {% endfor %}
</div>
{% endblock %}
